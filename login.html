<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <title>BíbliaViva — Login</title>
  <style>
    :root {
      --primary-gradient: linear-gradient(90deg, #4F8EF7, #7C6FE0);
      --danger: #FF3B30;
      --focus-glow: rgba(79, 142, 247, 0.25);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(160deg, #0d1117 0%, #161b2e 45%, #1a1040 100%);
      color: #fff;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow: hidden; /* Full-screen single view, scroll disabled */
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Orbs de luz ambiente */
    .orb-top-right {
      position: absolute;
      pointer-events: none;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(99,102,241,0.28) 0%, transparent 70%);
      filter: blur(60px);
      top: -40px;
      right: -60px;
      z-index: 0;
    }

    .orb-bottom-left {
      position: absolute;
      pointer-events: none;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(245,158,11,0.18) 0%, transparent 70%);
      filter: blur(70px);
      bottom: 100px;
      left: -40px;
      z-index: 0;
    }

    /* Container Principal */
    .login-container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      flex: 1;
      padding: env(safe-area-inset-top, 47px) 16px env(safe-area-inset-bottom, 34px) 16px;
    }

    /* Header (Logo & Texts) */
    .header {
      margin-top: 40px;
      margin-bottom: 40px;
      text-align: left;
    }

    .header-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .title {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 17px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.3;
    }

    /* Card Principal */
    .glass-card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 28px;
      box-shadow:
        0 8px 40px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Input Field Group */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
    }

    .input-label {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.85);
      margin-left: 4px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      font-size: 18px;
      color: rgba(255, 255, 255, 0.5);
      pointer-events: none;
    }

    .glass-input {
      width: 100%;
      height: 50px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      color: rgba(255, 255, 255, 0.95);
      font-size: 17px;
      padding: 0 16px 0 44px;
      outline: none;
      transition: all 0.2s ease-out;
    }

    .glass-input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .glass-input:focus {
      border-color: #4F8EF7;
      box-shadow: 0 0 0 4px var(--focus-glow);
      background: rgba(255, 255, 255, 0.1);
    }

    /* Error State */
    .input-group.has-error .glass-input {
      border-color: var(--danger);
      box-shadow: 0 0 0 4px rgba(255, 59, 48, 0.2);
    }

    .error-msg {
      font-size: 12px;
      color: var(--danger);
      margin-left: 4px;
      display: none;
    }
    
    .input-group.has-error .error-msg {
      display: block;
    }

    .eye-btn {
      position: absolute;
      right: 0;
      top: 0;
      height: 50px;
      width: 50px; /* Min 44x44 pt */
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Links */
    .forgot-password {
      align-self: flex-end;
      font-size: 15px;
      font-weight: 400;
      color: #4F8EF7;
      text-decoration: none;
      /* Invisible padding for 44px touch area */
      padding: 10px 0;
      margin-top: -8px;
    }

    /* Primary Button */
    .btn-primary {
      height: 54px;
      border-radius: 28px;
      background: var(--primary-gradient);
      border: none;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(79, 142, 247, 0.45);
      cursor: pointer;
      transition: transform 120ms ease-out, opacity 0.2s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary:active {
      transform: scale(0.97);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 24px 0;
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .divider:not(:empty)::before {
      margin-right: .5em;
    }
    .divider:not(:empty)::after {
      margin-left: .5em;
    }

    /* Social Buttons */
    .social-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: auto;
      padding-bottom: 24px;
    }

    .btn-social {
      height: 50px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #fff;
      font-size: 17px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-social:active {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn-apple {
      background: #000;
      border-color: rgba(255,255,255,0.2);
    }
    .btn-apple:active {
      background: #111;
    }
  </style>
</head>
<body>

  <!-- Ambient Light Orbs -->
  <div class="orb-top-right"></div>
  <div class="orb-bottom-left"></div>

  <div class="login-container">
    
    <div class="header">
      <div class="header-icon">📖</div>
      <h1 class="title">Bem-vindo</h1>
      <p class="subtitle">Faça login para continuar sua jornada espiritual.</p>
    </div>

    <div class="glass-card">
      
      <!-- Campo Email -->
      <div class="input-group" id="group-email">
        <label class="input-label" for="email">E-mail</label>
        <div class="input-wrapper">
          <span class="input-icon">✉️</span>
          <input type="email" id="email" class="glass-input" placeholder="seu@email.com" keyboardType="emailAddress" autocomplete="email">
        </div>
        <span class="error-msg">Por favor, insira um e-mail válido.</span>
      </div>

      <!-- Campo Senha -->
      <div class="input-group" id="group-password">
        <label class="input-label" for="password">Senha</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" class="glass-input" placeholder="••••••••" secureTextEntry>
          <button type="button" class="eye-btn" onclick="togglePassword()" aria-label="Mostrar senha">👁️</button>
        </div>
        <span class="error-msg">A senha incorreta. Tente novamente.</span>
      </div>

      <a href="#" class="forgot-password">Esqueci minha senha</a>

      <button class="btn-primary" onclick="simulateLogin()">Entrar</button>

    </div>

    <div class="divider">ou entre com</div>

    <div class="social-buttons">
      <button class="btn-social btn-apple">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM15.54 18.06C14.7 18.66 13.56 19.06 12.3 19.06C9.18 19.06 6.84 16.5 6.84 13.06C6.84 9.68 9.3 7.04 12.3 7.04C13.44 7.04 14.52 7.42 15.3 8.04L13.8 9.98C13.38 9.68 12.86 9.5 12.28 9.5C10.58 9.5 9.24 11.02 9.24 13.04C9.24 15.06 10.58 16.58 12.28 16.58C13 16.58 13.58 16.36 13.98 16L15.54 18.06Z" fill="none"/>
          <path d="M16.3614 16.1897C17.1587 14.881 17.5996 13.3088 17.5996 11.5833C17.5996 11.3787 17.5855 11.1788 17.562 10.9836H11.9996V13.0847H15.1764C15.0416 13.8117 14.6062 14.4373 13.988 14.8488V16.1897H16.3614Z" fill="white"/>
          <path d="M11.9996 18.7905C13.5836 18.7905 14.9126 18.2662 15.8903 17.3995L13.6186 15.6372C13.0886 15.9926 12.6045 16.166 11.9996 16.166C10.5186 16.166 9.26189 15.1665 8.81315 13.8184H6.36328V15.7196C7.40324 17.7854 9.53982 18.7905 11.9996 18.7905Z" fill="white"/>
          <path d="M8.81313 13.8184C8.69837 13.4735 8.63412 13.1093 8.63412 12.7357C8.63412 12.3621 8.69837 11.9979 8.81313 11.6531V9.75183H6.36326C5.90886 10.6558 5.64746 11.6702 5.64746 12.7357C5.64746 13.8013 5.90886 14.8157 6.36326 15.7196L8.81313 13.8184Z" fill="white"/>
          <path d="M11.9996 9.30541C12.8624 9.30541 13.6367 9.60228 14.2461 10.1837L16.4293 8.00045C15.2687 6.91741 13.7821 6.25 11.9996 6.25C9.53982 6.25 7.40324 7.25506 6.36328 9.32087L8.81315 11.222C9.26189 9.87395 10.5186 8.30541 11.9996 9.30541Z" fill="white"/>
          <path d="M16.5 13C16.5 15.4853 14.4853 17.5 12 17.5C9.51472 17.5 7.5 15.4853 7.5 13C7.5 10.5147 9.51472 8.5 12 8.5C14.4853 8.5 16.5 10.5147 16.5 13Z" fill="white" stroke="white" stroke-width="0.5"/>
        </svg>
        Entrar com Apple
      </button>

      <button class="btn-social">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25C22.56 11.47 22.49 10.72 22.36 10H12V14.26H17.92C17.66 15.63 16.88 16.8 15.71 17.58V20.34H19.28C21.36 18.42 22.56 15.6 22.56 12.25Z" fill="#4285F4"/>
          <path d="M12 23C14.97 23 17.46 22.02 19.28 20.34L15.71 17.58C14.72 18.24 13.46 18.66 12 18.66C9.17 18.66 6.76 16.75 5.91 14.18H2.23V17.03C4.03 20.61 7.7 23 12 23Z" fill="#34A853"/>
          <path d="M5.91 14.18C5.69 13.52 5.57 12.78 5.57 12C5.57 11.22 5.69 10.48 5.91 9.82V6.97H2.23C1.49 8.44 1.05 10.15 1.05 12C1.05 13.85 1.49 15.56 2.23 17.03L5.91 14.18Z" fill="#FBBC05"/>
          <path d="M12 5.34C13.62 5.34 15.06 5.89 16.2 6.98L19.35 3.83C17.45 2.06 14.97 1 12 1C7.7 1 4.03 3.39 2.23 6.97L5.91 9.82C6.76 7.25 9.17 5.34 12 5.34Z" fill="#EA4335"/>
        </svg>
        Entrar com Google
      </button>
    </div>

    <div style="text-align: center; padding: 24px 0 16px; font-size: 15px; color: rgba(255, 255, 255, 0.5);">
      Não tem uma conta? <a href="registro.html" style="color: #4F8EF7; text-decoration: none; font-weight: 500; padding: 10px 4px;">Criar conta</a>
    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const btn = document.querySelector('.eye-btn');
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '👁️‍🗨️';
      } else {
        input.type = 'password';
        btn.textContent = '👁️';
      }
    }

    // Mock functions for visual validation showcase without touching auth logic
    function simulateLogin() {
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      
      const emailGroup = document.getElementById('group-email');
      const passGroup = document.getElementById('group-password');
      
      emailGroup.classList.remove('has-error');
      passGroup.classList.remove('has-error');

      if (!email.includes('@')) {
        emailGroup.classList.add('has-error');
      }
      if (pass.length < 6) {
        passGroup.classList.add('has-error');
      }

      if (email.includes('@') && pass.length >= 6) {
        // Sucesso visual
        const btn = document.querySelector('.btn-primary');
        const oldText = btn.textContent;
        btn.textContent = 'Entrando...';
        btn.style.opacity = '0.8';

        // Salva estado de login localmente
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('userEmail', email);
        const namePart = email.split('@')[0];
        const formattedName = namePart.charAt(0).toUpperCase() + namePart.slice(1);
        localStorage.setItem('userName', formattedName);

        setTimeout(() => {
          window.location.href = 'bibliaviva.html';
        }, 1000);
      }
    }

    // Suporte ao pressionar a tecla Enter
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') simulateLogin();
    });
  </script>
</body>
</html>
