<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Intensivas · Bíblia Viva</title>
<meta name="description" content="Trilhas temáticas de leitura bíblica guiada — aprofunde seu estudo com intensivas sobre Fé, Perdão, Ansiedade e mais.">
<style>
/* ━━━━━━━━━ RESET & BASE ━━━━━━━━━ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  background: #F2F2F7;
  color: #000;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  padding-bottom: env(safe-area-inset-bottom, 0);
}

/* ━━━━━━━━━ HEADER ━━━━━━━━━ */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: rgba(242, 242, 247, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 0.5px solid rgba(0,0,0,0.06);
}
.header-back {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 16px;
  color: #007AFF;
  text-decoration: none;
  font-weight: 500;
  background: none;
  border: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  min-height: 44px;
  min-width: 44px;
  padding: 0;
}
.header-back svg {
  width: 20px;
  height: 20px;
  stroke: #007AFF;
  stroke-width: 2.5;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.header-title {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.header-spacer { width: 44px; }
.header-xp {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  font-weight: 700;
  color: #F59E0B;
  min-width: 44px;
  justify-content: flex-end;
}

/* ━━━━━━━━━ SUBTITLE ━━━━━━━━━ */
.page-subtitle {
  font-size: 13px;
  color: #8E8E93;
  padding: 12px 16px 4px;
}

/* ━━━━━━━━━ SECTION LABEL ━━━━━━━━━ */
.section-label {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.4px;
  padding: 20px 16px 8px;
  color: #000;
}

/* ━━━━━━━━━ INTENSIVA CARD (LIST) ━━━━━━━━━ */
.cards-container {
  padding: 0 16px 32px;
}
.intensiva-card {
  background: #ffffff;
  border-radius: 16px;
  border: 0.5px solid rgba(0,0,0,0.08);
  padding: 16px;
  margin-bottom: 12px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform .15s ease, box-shadow .15s ease;
  position: relative;
  overflow: hidden;
}
.intensiva-card:active { transform: scale(0.98); }
.card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.card-tema {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 16px;
  font-weight: 700;
  color: #000;
  line-height: 1.2;
}
.card-tema-icone { font-size: 18px; }

/* Pills */
.pill {
  flex-shrink: 0;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
  letter-spacing: 0.2px;
  white-space: nowrap;
}
.pill-nova { color: #fff; }
.pill-progresso { background: #E5E5EA; color: #636366; }
.pill-concluida { background: #34C759; color: #fff; }
.pill-sazonal {
  background: linear-gradient(135deg, #F59E0B, #F97316);
  color: #fff;
  font-size: 10px;
}

/* ━━━━━━━━━ ODISSEIA PREMIUM CARD ━━━━━━━━━ */
.odisseia-card {
  background: linear-gradient(145deg, #1a1200, #2d1f00, #1a1200);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 16px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform .2s ease, box-shadow .2s ease;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(212,175,55,0.25);
  box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(212,175,55,0.1);
}
.odisseia-card::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(ellipse at 30% 20%, rgba(212,175,55,0.08) 0%, transparent 50%);
  pointer-events: none;
}
.odisseia-card:active { transform: scale(0.97); }
.odisseia-card .card-tema { color: #F5DEB3; font-size: 18px; }
.odisseia-card .card-tema-icone { font-size: 24px; }
.odisseia-card .card-desc { color: rgba(245,222,179,0.65); font-size: 14px; line-height: 1.5; }
.odisseia-card .card-badge { background: rgba(212,175,55,0.15); color: #D4AF37; }
.odisseia-card .card-meta { color: rgba(245,222,179,0.5); }
.odisseia-card .progress-track { background: rgba(212,175,55,0.12); height: 6px; }
.odisseia-card .progress-fill { background: linear-gradient(90deg, #D4AF37, #F5DEB3) !important; }
.pill-odisseia {
  background: linear-gradient(135deg, #D4AF37, #F5DEB3);
  color: #1a1200;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* ━━━━━━━━━ ODISSEIA DETAIL ━━━━━━━━━ */
.odisseia-hero {
  background: linear-gradient(145deg, #1a1200, #2d1f00);
  border-radius: 20px;
  padding: 24px 16px;
  margin: 8px 16px 16px;
  border: 1px solid rgba(212,175,55,0.2);
  position: relative;
  overflow: hidden;
}
.odisseia-hero::before {
  content: '';
  position: absolute;
  top: -30%; right: -20%;
  width: 60%; height: 160%;
  background: radial-gradient(ellipse, rgba(212,175,55,0.06) 0%, transparent 60%);
  pointer-events: none;
}
.odisseia-hero .hero-tema { color: #F5DEB3; }
.odisseia-hero .hero-desc { color: rgba(245,222,179,0.6); }
.odisseia-hero .hero-badge { background: rgba(212,175,55,0.15); color: #D4AF37; }
.odisseia-hero .hero-progress-track { background: rgba(212,175,55,0.12); }
.odisseia-hero .hero-progress-fill { background: linear-gradient(90deg, #D4AF37, #F5DEB3) !important; }
.odisseia-hero .hero-meta { color: rgba(245,222,179,0.55); }

/* Phase header */
.fase-header {
  padding: 16px 16px 6px;
  margin: 8px 16px 0;
}
.fase-numero {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #D4AF37;
  margin-bottom: 2px;
}
.fase-nome {
  font-size: 17px;
  font-weight: 700;
  color: #000;
  letter-spacing: -0.2px;
}
.fase-subtitulo {
  font-size: 12px;
  color: #8E8E93;
  margin-top: 1px;
}

/* Palavra de Jesus indicator */
.palavra-jesus {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 10px;
  font-weight: 700;
  color: #DC2626;
  background: rgba(220,38,38,0.08);
  padding: 2px 7px;
  border-radius: 4px;
  margin-top: 4px;
}
.odisseia-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #D4AF37;
  padding: 20px 16px 4px;
}

/* Card meta row */
.card-meta-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.card-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 11px;
  font-weight: 500;
  color: #8E8E93;
  background: #F2F2F7;
  padding: 2px 8px;
  border-radius: 6px;
}
.card-desc {
  font-size: 13px;
  color: #8E8E93;
  margin-top: 4px;
  line-height: 1.4;
}
.progress-track {
  height: 5px;
  border-radius: 3px;
  background: #F2F2F7;
  margin-top: 10px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width .4s ease;
}
.card-meta {
  font-size: 11px;
  color: #8E8E93;
  margin-top: 6px;
}

/* ━━━━━━━━━ HERO (DETAIL) ━━━━━━━━━ */
.hero-banner {
  border-radius: 16px;
  padding: 20px 16px;
  margin: 8px 16px 16px;
}
.hero-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.hero-icone { font-size: 32px; line-height: 1; }
.hero-tema {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.hero-desc {
  font-size: 13px;
  color: #636366;
  margin-top: 6px;
  line-height: 1.4;
}
.hero-badges {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 8px;
  background: rgba(0,0,0,0.05);
  color: #636366;
}
.hero-progress-track {
  height: 8px;
  border-radius: 4px;
  background: rgba(0,0,0,0.08);
  margin-top: 14px;
  overflow: hidden;
}
.hero-progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width .4s ease;
}
.hero-meta {
  font-size: 12px;
  color: #636366;
  margin-top: 8px;
  font-weight: 500;
}

/* ━━━━━━━━━ ETAPAS LIST ━━━━━━━━━ */
.etapas-container {
  background: #fff;
  border-radius: 16px;
  border: 0.5px solid rgba(0,0,0,0.08);
  margin: 0 16px 16px;
  overflow: hidden;
  position: relative;
}
.etapa-row {
  display: flex;
  align-items: flex-start;
  padding: 14px 16px;
  gap: 12px;
  border-bottom: 0.5px solid rgba(0,0,0,0.06);
  -webkit-tap-highlight-color: transparent;
  transition: background .15s ease, opacity .2s ease;
  position: relative;
}
.etapa-row:last-child { border-bottom: none; }
.etapa-row.bloqueada {
  opacity: 0.45;
  pointer-events: none;
}
.etapa-row.proxima {
  background: rgba(0,0,0,0.02);
}

/* Path connector line */
.etapa-path {
  position: absolute;
  left: 27px;
  top: 38px;
  bottom: -2px;
  width: 2px;
  border-radius: 1px;
}
.etapa-row:last-child .etapa-path { display: none; }

/* Checkbox */
.etapa-check {
  width: 24px;
  height: 24px;
  min-width: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all .25s cubic-bezier(0.34, 1.56, 0.64, 1);
  -webkit-tap-highlight-color: transparent;
  border: 1.5px solid #D1D5DB;
  background: #fff;
  margin-top: 2px;
}
.etapa-check.marcado {
  border-color: transparent;
  transform: scale(1);
}
.etapa-check.marcado::after {
  content: '✓';
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  line-height: 1;
}
.etapa-check.bloqueado {
  border-color: #E5E5EA;
  background: #F9FAFB;
  cursor: default;
}
.etapa-check.bloqueado::after {
  content: '🔒';
  font-size: 10px;
}

/* Pulse animation for next step */
.etapa-check.proximo {
  animation: pulseRing 2s ease-in-out infinite;
}
@keyframes pulseRing {
  0%, 100% { box-shadow: 0 0 0 0 rgba(0,122,255,0.3); }
  50% { box-shadow: 0 0 0 6px rgba(0,122,255,0); }
}

/* Number badge */
.etapa-num {
  width: 22px;
  height: 22px;
  min-width: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  margin-top: 2px;
}

/* Body */
.etapa-corpo { flex: 1; min-width: 0; }
.etapa-titulo {
  font-size: 15px;
  font-weight: 600;
  color: #000;
  line-height: 1.3;
}
.etapa-ref {
  font-size: 12px;
  color: #8E8E93;
  margin-top: 1px;
}

/* Reflexão */
.etapa-reflexao {
  margin-top: 8px;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-style: italic;
  line-height: 1.5;
  color: #636366;
  border-left: 3px solid;
}

/* Botão Ler */
.etapa-ler {
  flex-shrink: 0;
  font-size: 12px;
  font-weight: 600;
  border-radius: 8px;
  padding: 5px 10px;
  border: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: opacity .15s ease, transform .15s ease;
  min-height: 32px;
  margin-top: 2px;
}
.etapa-ler:active { opacity: 0.7; transform: scale(0.95); }

/* ━━━━━━━━━ CONGRATULATIONS CARD ━━━━━━━━━ */
.congrats-card {
  border-radius: 16px;
  padding: 24px 16px;
  text-align: center;
  margin: 0 16px 32px;
  border-width: 1px;
  border-style: solid;
}
.congrats-icone { font-size: 48px; margin-bottom: 10px; }
.congrats-titulo {
  font-size: 20px;
  font-weight: 700;
  color: #000;
  margin-bottom: 4px;
  letter-spacing: -0.3px;
}
.congrats-texto {
  font-size: 14px;
  color: #636366;
  margin-bottom: 16px;
  line-height: 1.4;
}
.congrats-xp {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 16px;
  letter-spacing: -0.5px;
}
.congrats-btns {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.congrats-btn {
  display: inline-block;
  font-size: 15px;
  font-weight: 600;
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 12px 20px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: opacity .15s ease;
  min-height: 44px;
}
.congrats-btn:active { opacity: 0.8; }
.congrats-btn-secondary {
  display: inline-block;
  font-size: 15px;
  font-weight: 600;
  border: none;
  border-radius: 12px;
  padding: 12px 20px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: opacity .15s ease;
  min-height: 44px;
  background: rgba(0,0,0,0.05);
  color: #636366;
}
.congrats-btn-secondary:active { opacity: 0.7; }

/* ━━━━━━━━━ XP TOAST ━━━━━━━━━ */
.xp-toast {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: #000;
  color: #F5A623;
  font-size: 15px;
  font-weight: 700;
  padding: 10px 20px;
  border-radius: 100px;
  opacity: 0;
  pointer-events: none;
  z-index: 999;
  transition: all .35s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
}
.xp-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ━━━━━━━━━ VIEW TOGGLE ━━━━━━━━━ */
.view { display: none; }
.view.ativa { display: block; }

/* ━━━━━━━━━ ANIMATIONS ━━━━━━━━━ */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.intensiva-card,
.etapa-row {
  animation: fadeIn .3s ease both;
}
.intensiva-card:nth-child(2) { animation-delay: .05s; }
.intensiva-card:nth-child(3) { animation-delay: .1s; }
.intensiva-card:nth-child(4) { animation-delay: .15s; }
.intensiva-card:nth-child(5) { animation-delay: .2s; }
.etapa-row:nth-child(2) { animation-delay: .03s; }
.etapa-row:nth-child(3) { animation-delay: .06s; }
.etapa-row:nth-child(4) { animation-delay: .09s; }
.etapa-row:nth-child(5) { animation-delay: .12s; }
.etapa-row:nth-child(6) { animation-delay: .15s; }
.etapa-row:nth-child(7) { animation-delay: .18s; }

@keyframes checkPop {
  0% { transform: scale(0.6); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
.etapa-check.just-marked {
  animation: checkPop .35s cubic-bezier(0.34, 1.56, 0.64, 1);
}
</style>
</head>
<body>

<!-- XP TOAST -->
<div class="xp-toast" id="xp-toast"></div>

<!-- ========== VIEW 1: LISTA ========== -->
<div class="view ativa" id="view-lista">
  <div class="header">
    <a class="header-back" href="index.html" title="Voltar para Missões">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>

    <div class="header-title">Intensivas</div>
    <div class="header-xp" id="header-xp-display">⚡ <span id="header-xp-value">0</span></div>
  </div>
  <div class="page-subtitle">Escolha uma trilha temática e aprofunde seu estudo.</div>
  <div id="cards-container"></div>
</div>

<!-- ========== VIEW 2: DETALHE ========== -->
<div class="view" id="view-detalhe">
  <div class="header">
    <button class="header-back" onclick="voltarParaLista()" title="Voltar">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <div class="header-title" id="detalhe-header-title"></div>
    <div class="header-xp">⚡ <span id="detalhe-xp-value">0</span></div>
  </div>
  <div id="detalhe-content"></div>
</div>

/* ━━━━━━━━━ PROGRESSO (localStorage) ━━━━━━━━━ */
function getProgresso(intensivaId) {
  var raw = localStorage.getItem('intensiva_' + intensivaId);
  return raw ? JSON.parse(raw) : { etapasConcluidas: [] };
}

function getXpTotal() {
  return parseInt(localStorage.getItem('intensiva_xp_total') || '0', 10);
}

function addXp(amount) {
  var total = getXpTotal() + amount;
  localStorage.setItem('intensiva_xp_total', total.toString());
  atualizarXpDisplay();
  return total;
}

function atualizarXpDisplay() {
  var xp = getXpTotal();
  var els = document.querySelectorAll('#header-xp-value, #detalhe-xp-value');
  els.forEach(function(el) { el.textContent = xp; });
}

function showXpToast(msg) {
  var toast = document.getElementById('xp-toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 1800);
}

function marcarEtapa(intensivaId, ordem) {
  var p = getProgresso(intensivaId);
  if (!p.etapasConcluidas.includes(ordem)) {
    p.etapasConcluidas.push(ordem);
    localStorage.setItem('intensiva_' + intensivaId, JSON.stringify(p));
    addXp(25);
    showXpToast('⚡ +25 XP');

    // Check if trail is now complete
    var int = intensivas.find(function(i) { return i.id === intensivaId; });
    if (int && p.etapasConcluidas.length === int.totalEtapas) {
      setTimeout(function() {
        addXp(100);
        showXpToast('🎉 +100 XP Bônus — Trilha Completa!');
      }, 600);
    }
  }
  renderizarTudo();
}

function desmarcarEtapa(intensivaId, ordem) {
  var p = getProgresso(intensivaId);
  p.etapasConcluidas = p.etapasConcluidas.filter(function(e) { return e !== ordem; });
  localStorage.setItem('intensiva_' + intensivaId, JSON.stringify(p));
  renderizarTudo();
}

function percentual(intensivaId, total) {
  var p = getProgresso(intensivaId);
  return Math.round((p.etapasConcluidas.length / total) * 100);
}

/* ━━━━━━━━━ VIEW STATE ━━━━━━━━━ */
var viewAtual = 'lista';
var intensivaAtiva = null;

function irParaDetalhe(id) {
  intensivaAtiva = intensivas.find(function(i) { return i.id === id; });
  viewAtual = 'detalhe';
  renderizarTudo();
  window.scrollTo(0, 0);
}

function voltarParaLista() {
  viewAtual = 'lista';
  intensivaAtiva = null;
  renderizarTudo();
  window.scrollTo(0, 0);
}

/* ━━━━━━━━━ NAVEGAÇÃO PARA LEITURA ━━━━━━━━━ */
function irParaLeitura(intensivaId, ordem, livro, capitulo, nome, autoplay = false) {
  // Navigate to reading tab
  var url = 'index.html?livro=' + encodeURIComponent(livro) + '&capitulo=' + capitulo + '&intId=' + intensivaId + '&intOrd=' + ordem + '&intNome=' + encodeURIComponent(nome || '');
  if (autoplay) {
    url += '&autoplay=true';
  }
  window.location.href = url;
}

/* ━━━━━━━━━ COMPARTILHAR ━━━━━━━━━ */
function compartilharTrilha(tema, icone) {
  var texto = icone + ' Completei a trilha "' + tema + '" no BíbliaViva! Aprofundei meu estudo bíblico com essa jornada incrível. #BíbliaViva #FéEmAção';
  if (navigator.share) {
    navigator.share({ title: 'BíbliaViva — Intensiva Concluída!', text: texto }).catch(function() {});
  } else {
    navigator.clipboard.writeText(texto).then(function() {
      showXpToast('📋 Texto copiado!');
    });
  }
}

/* ━━━━━━━━━ RENDER ━━━━━━━━━ */
function renderizarTudo() {
  atualizarXpDisplay();
  document.getElementById('view-lista').classList.toggle('ativa', viewAtual === 'lista');
  document.getElementById('view-detalhe').classList.toggle('ativa', viewAtual === 'detalhe');

  if (viewAtual === 'lista') {
    renderizarLista();
  } else {
    renderizarDetalhe();
  }
}

function getDificuldadeIcon(d) {
  if (d === 'Avançado') return '🔴';
  if (d === 'Intermediário') return '🟡';
  return '🟢';
}

function renderizarLista() {
  var container = document.getElementById('cards-container');
  var html = '';

  // Separate odyssey, seasonal and regular
  var odisseia = intensivas.filter(function(i) { return i.tipo === 'odisseia'; });
  var sazonais = intensivas.filter(function(i) { return i.sazonal && i.tipo !== 'odisseia'; });
  var regulares = intensivas.filter(function(i) { return !i.sazonal && i.tipo !== 'odisseia'; });

  // Odisseia first — premium hero card
  if (odisseia.length > 0) {
    html += '<div class="odisseia-label">🐑 JORNADA ÉPICA</div>';
    odisseia.forEach(function(int) { html += renderOdisseiaCard(int); });
  }

  // Sazonais
  if (sazonais.length > 0) {
    html += '<div class="section-label">✨ Especiais</div>';
    sazonais.forEach(function(int) { html += renderCard(int); });
  }

  html += '<div class="section-label">Trilhas</div>';
  regulares.forEach(function(int) { html += renderCard(int); });

  container.innerHTML = html;
}

function renderOdisseiaCard(int) {
  var pct = percentual(int.id, int.totalEtapas);
  var prog = getProgresso(int.id);
  var concluidas = prog.etapasConcluidas.length;
  var duracao = int.totalEtapas * 3;
  var fasesCount = int.fases ? int.fases.length : 0;

  var pillHtml = '';
  if (pct === 0) {
    pillHtml = '<span class="pill pill-odisseia">Iniciar Jornada</span>';
  } else if (pct < 100) {
    pillHtml = '<span class="pill pill-odisseia">' + pct + '% · Fase ' + getFaseAtual(int, prog) + '</span>';
  } else {
    pillHtml = '<span class="pill pill-concluida">✓ Jornada Completa</span>';
  }

  return ''
    + '<div class="odisseia-card" onclick="irParaDetalhe(\'' + int.id + '\')" role="button" tabindex="0">'
    +   '<div class="card-top">'
    +     '<div class="card-tema">'
    +       '<span class="card-tema-icone">' + int.icone + '</span>'
    +       '<span>' + int.tema + '</span>'
    +     '</div>'
    +     pillHtml
    +   '</div>'
    +   '<div class="card-desc">' + int.descricao + '</div>'
    +   '<div class="card-meta-row" style="margin-top:10px">'
    +     '<span class="card-badge">📜 ' + fasesCount + ' fases</span>'
    +     '<span class="card-badge">📖 ' + int.totalEtapas + ' capítulos</span>'
    +     '<span class="card-badge">🕐 ~' + duracao + ' min</span>'
    +   '</div>'
    +   '<div class="progress-track">'
    +     '<div class="progress-fill" style="width:' + pct + '%"></div>'
    +   '</div>'
    +   '<div class="card-meta">' + concluidas + '/' + int.totalEtapas + ' concluídos</div>'
    + '</div>';
}

function getFaseAtual(int, prog) {
  if (!int.fases) return 1;
  for (var i = 0; i < int.fases.length; i++) {
    var fase = int.fases[i];
    var allDone = fase.etapas.every(function(e) { return prog.etapasConcluidas.includes(e.ordem); });
    if (!allDone) return i + 1;
  }
  return int.fases.length;
}

function renderCard(int) {
  var pct = percentual(int.id, int.totalEtapas);
  var prog = getProgresso(int.id);
  var concluidas = prog.etapasConcluidas.length;
  var duracao = int.totalEtapas * 3;

  var pillHtml = '';
  if (int.sazonal) {
    pillHtml = '<span class="pill pill-sazonal">✨ Especial</span>';
  } else if (pct === 0) {
    pillHtml = '<span class="pill pill-nova" style="background:' + int.cor + '">Nova</span>';
  } else if (pct < 100) {
    pillHtml = '<span class="pill pill-progresso">' + pct + '%</span>';
  } else {
    pillHtml = '<span class="pill pill-concluida">✓ Concluída</span>';
  }

  return ''
    + '<div class="intensiva-card" onclick="irParaDetalhe(\'' + int.id + '\')">'
    +   '<div class="card-top">'
    +     '<div class="card-tema">'
    +       '<span class="card-tema-icone">' + int.icone + '</span>'
    +       '<span>' + int.tema + '</span>'
    +     '</div>'
    +     pillHtml
    +   '</div>'
    +   '<div class="card-desc">' + int.descricao + '</div>'
    +   '<div class="card-meta-row">'
    +     '<span class="card-badge">' + getDificuldadeIcon(int.dificuldade) + ' ' + int.dificuldade + '</span>'
    +     '<span class="card-badge">🕐 ~' + duracao + ' min</span>'
    +     '<span class="card-badge">📖 ' + int.totalEtapas + ' capítulos</span>'
    +   '</div>'
    +   '<div class="progress-track">'
    +     '<div class="progress-fill" style="width:' + pct + '%; background:' + int.cor + '"></div>'
    +   '</div>'
    +   '<div class="card-meta">' + concluidas + '/' + int.totalEtapas + ' concluídos</div>'
    + '</div>';
}

function renderizarDetalhe() {
  if (!intensivaAtiva) return;

  var int = intensivaAtiva;
  var pct = percentual(int.id, int.totalEtapas);
  var prog = getProgresso(int.id);
  var concluidas = prog.etapasConcluidas.length;
  var duracao = int.totalEtapas * 3;
  var isOdisseia = int.tipo === 'odisseia';

  document.getElementById('detalhe-header-title').textContent = int.tema;

  var html = '';

  // Hero banner
  var heroClass = isOdisseia ? 'odisseia-hero' : 'hero-banner';
  var heroStyle = isOdisseia ? '' : 'background:' + hexToRgba(int.cor, 0.10);

  html += ''
    + '<div class="' + heroClass + '" style="' + heroStyle + '">'
    +   '<div class="hero-row">'
    +     '<div class="hero-icone">' + int.icone + '</div>'
    +     '<div class="hero-tema" style="' + (isOdisseia ? '' : 'color:' + int.cor) + '">' + int.tema + '</div>'
    +   '</div>'
    +   '<div class="hero-desc">' + int.descricao + '</div>'
    +   '<div class="hero-badges">'
    +     '<span class="hero-badge">' + getDificuldadeIcon(int.dificuldade) + ' ' + int.dificuldade + '</span>'
    +     '<span class="hero-badge">🕐 ~' + duracao + ' min</span>'
    +     (isOdisseia && int.fases ? '<span class="hero-badge">📜 ' + int.fases.length + ' fases</span>' : '')
    +     (int.sazonal && !isOdisseia ? '<span class="hero-badge" style="background:' + hexToRgba(int.cor, 0.15) + '; color:' + int.cor + '">✨ Especial</span>' : '')
    +   '</div>'
    +   '<div class="hero-progress-track">'
    +     '<div class="hero-progress-fill" style="width:' + pct + '%; ' + (isOdisseia ? '' : 'background:' + int.cor) + '"></div>'
    +   '</div>'
    +   '<div class="hero-meta">' + pct + '% concluído · ' + concluidas + ' de ' + int.totalEtapas + ' capítulos</div>'
    +   '<div style="margin-top: 18px; text-align: center;">'
    +     '<button class="congrats-btn" style="' + (isOdisseia ? 'background: linear-gradient(135deg, #D4AF37, #F5DEB3); color: #1a1200;' : 'background:' + int.cor + ';') + ' display: inline-flex; width: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.2);" onclick="window.location.href=\'index.html?quizId=intensiva-' + int.id + '&quizTitle=' + encodeURIComponent('Quiz: ' + int.tema) + '\'">🎯 Fazer Quiz da Trilha</button>'
    +   '</div>'
    + '</div>';

  // Render with or without fases
  if (isOdisseia && int.fases) {
    html += renderizarFases(int, prog);
  } else {
    html += renderizarEtapasFlat(int, prog);
  }

  // Congratulations card
  if (pct === 100) {
    var congratsBg = isOdisseia ? 'background: linear-gradient(145deg, #1a1200, #2d1f00); border-color: rgba(212,175,55,0.3)' : 'background:' + hexToRgba(int.cor, 0.08) + '; border-color:' + hexToRgba(int.cor, 0.20);
    var congratsTitle = isOdisseia ? 'Odisseia Completa!' : 'Intensiva concluída!';
    var congratsTextColor = isOdisseia ? 'color: #F5DEB3' : '';
    var congratsSubColor = isOdisseia ? 'color: rgba(245,222,179,0.6)' : '';
    var congratsIcon = isOdisseia ? '👑' : '🎉';
    var btnBg = isOdisseia ? 'background: linear-gradient(135deg, #D4AF37, #F5DEB3); color: #1a1200' : 'background:' + int.cor;

    html += ''
      + '<div class="congrats-card" style="' + congratsBg + '">'
      +   '<div class="congrats-icone">' + congratsIcon + '</div>'
      +   '<div class="congrats-titulo" style="' + congratsTextColor + '">' + congratsTitle + '</div>'
      +   '<div class="congrats-texto" style="' + congratsSubColor + '">Você completou todos os ' + int.totalEtapas + ' capítulos' + (isOdisseia ? ' — de Gênesis a Apocalipse!' : ' sobre ' + int.tema + '.') + '</div>'
      +   '<div class="congrats-xp" style="color:' + int.cor + '">+' + (int.totalEtapas * 25 + 100) + ' XP ganhos</div>'
      +   '<div class="congrats-btns">'
      +     '<button class="congrats-btn" style="' + btnBg + '" onclick="compartilharTrilha(\'' + int.tema + '\', \'' + int.icone + '\')">📤 Compartilhar conquista</button>'
      +     '<button class="congrats-btn-secondary" onclick="voltarParaLista()">Explorar outras trilhas</button>'
      +   '</div>'
      + '</div>';
  }

  document.getElementById('detalhe-content').innerHTML = html;
}

function renderizarFases(int, prog) {
  var html = '';
  var globalIdx = 0;
  var allEtapas = int.etapas;

  int.fases.forEach(function(fase, faseIdx) {
    // Phase header
    var faseComplete = fase.etapas.every(function(e) { return prog.etapasConcluidas.includes(e.ordem); });
    html += '<div class="fase-header">'
      + '<div class="fase-numero">Fase ' + toRoman(faseIdx + 1) + (faseComplete ? ' ✓' : '') + '</div>'
      + '<div class="fase-nome">' + fase.nome + '</div>'
      + '<div class="fase-subtitulo">' + fase.subtitulo + '</div>'
      + '</div>';

    // Etapas in this phase
    html += '<div class="etapas-container">';
    fase.etapas.forEach(function(etapa) {
      html += renderEtapaRow(int, etapa, allEtapas, globalIdx, prog);
      globalIdx++;
    });
    html += '</div>';
  });

  return html;
}

function renderizarEtapasFlat(int, prog) {
  var html = '<div class="etapas-container">';
  int.etapas.forEach(function(etapa, idx) {
    html += renderEtapaRow(int, etapa, int.etapas, idx, prog);
  });
  html += '</div>';
  return html;
}

function renderEtapaRow(int, etapa, allEtapas, idx, prog) {
  var isMarcado = prog.etapasConcluidas.includes(etapa.ordem);

  // Sequential: check if previous steps done
  var prevDone = true;
  for (var k = 0; k < idx; k++) {
    if (!prog.etapasConcluidas.includes(allEtapas[k].ordem)) {
      prevDone = false;
      break;
    }
  }
  var isBloqueada = !isMarcado && !prevDone;
  var isProxima = !isMarcado && prevDone;

  var rowClass = 'etapa-row';
  if (isBloqueada) rowClass += ' bloqueada';
  if (isProxima) rowClass += ' proxima';

  var checkClass = 'etapa-check';
  var checkStyle = '';
  if (isMarcado) {
    checkClass += ' marcado';
    checkStyle = 'background:' + int.cor + '; border-color:' + int.cor + ';';
  } else if (isBloqueada) {
    checkClass += ' bloqueado';
  } else if (isProxima) {
    checkClass += ' proximo';
    checkStyle = 'border-color:' + int.cor + ';';
  }

  var checkAction = '';
  if (isMarcado) {
    checkAction = 'desmarcarEtapa(\'' + int.id + '\', ' + etapa.ordem + ')';
  } else if (!isBloqueada) {
    checkAction = 'marcarEtapa(\'' + int.id + '\', ' + etapa.ordem + ')';
  }

  var livroEscaped = etapa.livro.replace(/'/g, "\\'");

  var html = ''
    + '<div class="' + rowClass + '">'
    +   '<div class="etapa-path" style="background:' + hexToRgba(int.cor, isMarcado ? 0.3 : 0.08) + '"></div>'
    +   '<div class="' + checkClass + '" style="' + checkStyle + '" '
    +     (checkAction ? 'onclick="event.stopPropagation(); ' + checkAction + '" ' : '')
    +     'role="checkbox" aria-checked="' + isMarcado + '" tabindex="0">'
    +   '</div>'
    +   '<div class="etapa-num" style="background:' + hexToRgba(int.cor, 0.10) + '; color:' + int.cor + '">' + etapa.ordem + '</div>'
    +   '<div class="etapa-corpo">'
    +     '<div class="etapa-titulo">' + etapa.titulo + '</div>'
    +     '<div class="etapa-ref">' + etapa.livro + ' ' + etapa.capitulo + '</div>'
    +     (etapa.palavraDeJesus ? '<div class="palavra-jesus">✝ Palavras de Jesus</div>' : '')
    +     (etapa.reflexao ? '<div class="etapa-reflexao" style="border-color:' + int.cor + '; background:' + hexToRgba(int.cor, 0.04) + '">💭 ' + etapa.reflexao + '</div>' : '')
    +   '</div>';

  if (!isBloqueada) {
    html += '<button class="etapa-ler" style="background:' + hexToRgba(int.cor, 0.10) + '; color:' + int.cor + '" '
      + 'onclick="event.stopPropagation(); irParaLeitura(\'' + int.id + '\', ' + etapa.ordem + ', \'' + livroEscaped + '\', ' + etapa.capitulo + ', \'' + int.tema.replace(/'/g, "\\'") + '\')">'
      + 'Ler'
      + '</button>';
  }

  html += '</div>';
  return html;
}

function toRoman(num) {
  var lookup = ['','I','II','III','IV','V','VI','VII','VIII','IX','X'];
  return lookup[num] || num;
}

/* ━━━━━━━━━ HELPERS ━━━━━━━━━ */
function hexToRgba(hex, alpha) {
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}

/* ━━━━━━━━━ INIT ━━━━━━━━━ */
document.addEventListener('DOMContentLoaded', function() {
  var urlParams = new URLSearchParams(window.location.search);
  var idParam = urlParams.get('id');
  var completedOrdParam = urlParams.get('completedOrd');
  var autoNextParam = urlParams.get('autoNext') === 'true';

  if (idParam) {
    var found = intensivas.find(function(i) { return i.id === idParam; });
    if (found) {
      intensivaAtiva = found;
      viewAtual = 'detalhe';
      
      if (completedOrdParam) {
        var ord = parseInt(completedOrdParam, 10);
        marcarEtapa(found.id, ord);
        
        if (autoNextParam) {
          var prog = getProgresso(found.id);
          var nextStep = found.etapas.find(function(e) { return !prog.etapasConcluidas.includes(e.ordem); });
          if (nextStep) {
            setTimeout(function() {
              irParaLeitura(found.id, nextStep.ordem, nextStep.livro, nextStep.capitulo, found.tema, true);
            }, 2000); // Wait 2s to show XP toast
          }
        }
      }
    }
  }
  renderizarTudo();
});
</script>
