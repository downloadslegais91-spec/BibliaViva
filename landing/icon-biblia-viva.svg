<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background Gradient: Rich Dark Blue to Deep Purple -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0E2C78" />
      <stop offset="50%" stop-color="#1B2384" />
      <stop offset="100%" stop-color="#4C239F" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glow-heavy" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="glow-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="star-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25" />
    </filter>
  </defs>

  <!-- 1. Squircle Background (iOS App Icon standards) -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" fill="url(#bg-gradient)" />

  <!-- 2. Ambient White Glow behind the book -->
  <circle cx="512" cy="512" r="280" fill="rgba(255, 255, 255, 0.08)" filter="url(#glow-heavy)" />
  <circle cx="512" cy="270" r="80" fill="#FFFFFF" opacity="0.15" filter="url(#star-glow)" />

  <!-- 3. The Open Book Icon (Multi-layered white vectors) -->
  <g stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round" fill="none">
    
    <!-- Outer/Background Page Outlines (Slightly lower & wider for paper depth) -->
    <!-- Left Background Page -->
    <path d="M 480,720 C 350,610 240,650 170,690 L 170,350 C 240,310 350,270 480,380 Z" stroke-width="24" stroke-opacity="0.5" />
    <!-- Right Background Page -->
    <path d="M 544,720 C 674,610 784,650 854,690 L 854,350 C 784,310 674,270 544,380 Z" stroke-width="24" stroke-opacity="0.5" />

    <!-- Inner/Foreground Page Outlines (Crisp & Highlighted) -->
    <!-- Left Foreground Page -->
    <path d="M 490,750 C 370,640 280,680 220,720 L 220,380 C 280,340 370,300 490,410 Z" stroke-width="32" stroke-opacity="0.95" filter="url(#glow-soft)" />
    <!-- Right Foreground Page -->
    <path d="M 534,750 C 654,640 744,680 804,720 L 804,380 C 744,340 654,300 534,410 Z" stroke-width="32" stroke-opacity="0.95" filter="url(#glow-soft)" />

    <!-- Center Spine Bar -->
    <line x1="512" y1="410" x2="512" y2="765" stroke-width="32" stroke-opacity="0.95" filter="url(#glow-soft)" />
  </g>

  <!-- 4. Glowing 4-Pointed Star -->
  <path d="M 512,210 Q 512,270 452,270 Q 512,270 512,330 Q 512,270 572,270 Q 512,270 512,210 Z" fill="#FFFFFF" filter="url(#glow-soft)" />

</svg>
